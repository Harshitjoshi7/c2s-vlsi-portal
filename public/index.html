<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="C2S VLSI Lab Management Portal — Manage students, projects, tasks, daily logs, attendance, and lab assets.">
  <meta name="theme-color" content="#0a0e27">

  <!-- PWA / Home Screen -->
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="C2S VLSI">
  <meta name="mobile-web-app-capable" content="yes">

  <title>C2S VLSI Lab Portal</title>


  <!-- Stylesheets -->
  <link rel="stylesheet" href="/css/design-system.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/layouts.css">
  <link rel="stylesheet" href="/css/animations.css">

  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(registration => {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
          })
          .catch(err => {
            console.log('ServiceWorker registration failed: ', err);
          });
      });
    }
  </script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

  <!-- SheetJS (for Excel Export) -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
</head>
<body>
  <!-- SPA Root -->
  <div id="app"></div>

  <!-- JS Modules -->
  <script src="/js/api.js?v=1.4"></script>
  <script src="/js/components/toast.js?v=1.4"></script>
  <script src="/js/components/modal.js?v=1.4"></script>
  <script src="/js/components/navbar.js?v=1.4"></script>
  <script src="/js/components/calendar.js?v=1.4"></script>
  <script src="/js/components/notifications.js?v=1.4"></script>
  <script src="/js/auth.js?v=1.4"></script>
  <script src="/js/dashboard.js?v=1.4"></script>
  <script src="/js/pages/daily-logs.js?v=1.4"></script>
  <script src="/js/pages/projects.js?v=1.4"></script>
  <script src="/js/pages/tasks.js?v=1.4"></script>
  <script src="/js/pages/attendance.js?v=1.4"></script>
  <script src="/js/pages/tickets.js?v=1.4"></script>
  <script src="/js/pages/users.js?v=1.4"></script>
  <script src="/js/pages/pcs.js?v=1.4"></script>
  <script src="/js/pages/announcements.js?v=1.4"></script>
  <script src="/js/pages/reports.js?v=1.4"></script>
  <script src="/js/pages/profile.js?v=1.4"></script>
  <script src="/js/pages/public-projects.js?v=1.4"></script>
  <script src="/js/pages/public-project.js?v=1.4"></script>
  <script src="/js/app.js?v=1.4"></script>
</body>
</html>
