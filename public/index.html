<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Under Update</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: #1e293b;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            width: 100%;
        }

        .icon-container {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
        }

        /* Pulsing background effect */
        .pulse {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #38bdf8;
            border-radius: 50%;
            opacity: 0.15;
            animation: pulse-animation 2s infinite ease-in-out;
        }

        .icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            fill: #38bdf8;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #ffffff;
        }

        p {
            font-size: 15px;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background-color: #334155;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .progress-line {
            width: 100%;
            height: 100%;
            background-color: #38bdf8;
            border-radius: 3px;
            animation: loading-animation 2s infinite ease-in-out;
            transform-origin: 0% 50%;
        }

        .footer-text {
            font-size: 12px;
            color: #64748b;
        }

        @keyframes pulse-animation {
            0% { transform: scale(0.95); opacity: 0.15; }
            50% { transform: scale(1.2); opacity: 0.3; }
            100% { transform: scale(0.95); opacity: 0.15; }
        }

        @keyframes loading-animation {
            0% { transform: translateX(-100%) scaleX(0.2); }
            50% { transform: translateX(0%) scaleX(0.5); }
            100% { transform: translateX(100%) scaleX(0.2); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-container">
            <div class="pulse"></div>
            <!-- Simple SVG Wrench/Maintenance Icon -->
            <svg class="icon" viewBox="0 0 24 24">
                <path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.3C.5 6.7.9 9.8 2.9 11.8c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.1z"/>
            </svg>
        </div>

        <h1>System Update in Progress</h1>
        <p>We are currently pushing some exciting new features and performance upgrades. We'll be back online shortly. Thank you for your patience!</p>
        
        <div class="progress-bar">
            <div class="progress-line"></div>
        </div>

        <div class="footer-text">
            Estimated down time: Less than 15 minutes
        </div>
    </div>

</body>
</html>
